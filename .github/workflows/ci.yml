name: Nexus Exchange CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Backend Tests ──
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nexus_test
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://nexus:test_password@localhost:5432/nexus_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          APP_ENV: test
          DEBUG: "true"
          JWT_SECRET_KEY: test-jwt-secret-key-minimum-32-chars
          ADMIN_JWT_SECRET_KEY: test-admin-jwt-secret-key-32-chars
          SECRET_KEY: test-secret-key-for-ci-64-characters-long-enough
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Syntax check all Python files
        run: |
          cd backend
          python -m py_compile app/main.py
          find app -name "*.py" -exec python -m py_compile {} \;

  # ── Frontend Build ──
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
        run: npm run build

      - name: Lint
        run: npm run lint || true

  # ── Deploy (only on main) ──
  deploy:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "✅ All checks passed. Ready for deployment."
          echo "Deploy steps:"
          echo "1. Build Docker images"
          echo "2. Run database migrations"
          echo "3. Deploy to production"
          echo "4. Run post-deploy health checks"
          # Add actual deployment commands here (e.g., docker push, kubectl apply)
