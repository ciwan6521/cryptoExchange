# Nginx site config for crypto4pro.io
# Port 3012 — Docker container
# Place at: /etc/nginx/sites-available/crypto4pro.io

upstream crypto4pro_upstream {
    server 127.0.0.1:3012;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name crypto4pro.io www.crypto4pro.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crypto4pro.io www.crypto4pro.io;

    # SSL — Certbot will fill these in automatically
    ssl_certificate /etc/letsencrypt/live/crypto4pro.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crypto4pro.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:crypto4pro_ssl:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    client_max_body_size 10M;

    # Next.js static assets — long cache
    location /_next/static {
        proxy_pass http://crypto4pro_upstream;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # All other requests
    location / {
        proxy_pass http://crypto4pro_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/crypto4pro.access.log;
    error_log /var/log/nginx/crypto4pro.error.log;
}
