version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto4pro_exchange
      POSTGRES_USER: crypto4pro
      POSTGRES_PASSWORD: crypto4pro_dev_password
    ports:
      - "5432:5432"
    volumes:
      - crypto4pro_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto4pro -d crypto4pro_exchange"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  crypto4pro_pg_data:
