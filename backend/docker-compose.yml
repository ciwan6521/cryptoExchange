version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: crypto4pro-postgres
    environment:
      POSTGRES_USER: crypto4pro
      POSTGRES_PASSWORD: crypto4pro_password
      POSTGRES_DB: crypto4pro_exchange
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto4pro -d crypto4pro_exchange"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (cache, event bus, Celery broker)
  redis:
    image: redis:7-alpine
    container_name: crypto4pro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto4pro-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker (campaign evaluation, background tasks)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto4pro-celery-worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

  # Celery Beat (periodic task scheduler)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto4pro-celery-beat
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.tasks.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
