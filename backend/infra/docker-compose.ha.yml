# ============================================================
# Crypto4Pro — High-Availability Docker Compose
#
# Components:
# - PostgreSQL primary + read replica
# - Redis sentinel (3-node)
# - PgBouncer connection pooler
# - Celery worker + beat
# - FastAPI app (2 instances behind load balancer)
#
# Usage:
#   docker-compose -f infra/docker-compose.ha.yml up -d
# ============================================================

version: "3.9"

services:
  # ── PostgreSQL Primary ──
  postgres-primary:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto4pro_exchange
      POSTGRES_USER: crypto4pro
      POSTGRES_PASSWORD: ${PGPASSWORD:?Set PGPASSWORD}
      POSTGRES_INITDB_ARGS: "--wal-segsize=64"
    ports:
      - "5432:5432"
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./pg-init:/docker-entrypoint-initdb.d
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=5
        -c max_replication_slots=5
        -c hot_standby=on
        -c archive_mode=on
        -c archive_command='cp %p /var/lib/postgresql/wal_archive/%f'
        -c shared_preload_libraries='pg_stat_statements'
        -c log_min_duration_statement=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto4pro -d crypto4pro_exchange"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL Read Replica ──
  postgres-replica:
    image: postgres:16-alpine
    environment:
      PGUSER: crypto4pro
      PGPASSWORD: ${PGPASSWORD}
    depends_on:
      postgres-primary:
        condition: service_healthy
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
    entrypoint: |
      bash -c "
        # Wait for primary
        until pg_isready -h postgres-primary -U crypto4pro; do sleep 1; done
        # Create base backup if data dir is empty
        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          pg_basebackup -h postgres-primary -U crypto4pro -D /var/lib/postgresql/data -Fp -Xs -R
        fi
        exec postgres
      "

  # ── PgBouncer Connection Pooler ──
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://crypto4pro:${PGPASSWORD}@postgres-primary:5432/crypto4pro_exchange
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
    ports:
      - "6432:6432"
    depends_on:
      postgres-primary:
        condition: service_healthy

  # ── Redis Sentinel ──
  redis-master:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_master_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-sentinel-1:
    image: redis:7-alpine
    depends_on:
      redis-master:
        condition: service_healthy
    command: >
      sh -c "
        echo 'sentinel monitor crypto4pro redis-master 6379 2' > /tmp/sentinel.conf
        echo 'sentinel down-after-milliseconds crypto4pro 5000' >> /tmp/sentinel.conf
        echo 'sentinel failover-timeout crypto4pro 10000' >> /tmp/sentinel.conf
        echo 'sentinel parallel-syncs crypto4pro 1' >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26379:26379"

  redis-sentinel-2:
    image: redis:7-alpine
    depends_on:
      redis-master:
        condition: service_healthy
    command: >
      sh -c "
        echo 'sentinel monitor crypto4pro redis-master 6379 2' > /tmp/sentinel.conf
        echo 'sentinel down-after-milliseconds crypto4pro 5000' >> /tmp/sentinel.conf
        echo 'sentinel failover-timeout crypto4pro 10000' >> /tmp/sentinel.conf
        echo 'sentinel parallel-syncs crypto4pro 1' >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26380:26379"

  # ── Celery Worker ──
  celery-worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://crypto4pro:${PGPASSWORD}@pgbouncer:6432/crypto4pro_exchange
      REDIS_URL: redis://redis-master:6379/0
      CELERY_BROKER_URL: redis://redis-master:6379/1
      CELERY_RESULT_BACKEND: redis://redis-master:6379/2
    depends_on:
      - pgbouncer
      - redis-master

  # ── Celery Beat Scheduler ──
  celery-beat:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://crypto4pro:${PGPASSWORD}@pgbouncer:6432/crypto4pro_exchange
      REDIS_URL: redis://redis-master:6379/0
      CELERY_BROKER_URL: redis://redis-master:6379/1
      CELERY_RESULT_BACKEND: redis://redis-master:6379/2
    depends_on:
      - redis-master

  # ── FastAPI App ──
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      DATABASE_URL: postgresql+asyncpg://crypto4pro:${PGPASSWORD}@pgbouncer:6432/crypto4pro_exchange
      REDIS_URL: redis://redis-master:6379/0
      APP_ENV: production
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      - pgbouncer
      - redis-master
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pg_primary_data:
  pg_replica_data:
  redis_master_data:
